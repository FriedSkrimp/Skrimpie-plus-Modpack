#Custom Config Variables that you can use
[custom]
	#Must these variables be parsed along with other variables
	enabled = true

	#Your custom variables to add
	[[custom.variables]]
		#The name of your variable. Will be parsed into {{custom.variablename}}
		name = "modpackname"
		#The value that this variable will output
		value = "Skrimpie+"

	[[custom.variables]]
		#The name of your variable. Will be parsed into {{custom.variablename}}
		name = "modpackver"
		#The value that this variable will output
		value = "26.0.2"

#Dimension Information Overrides
[dimension_overrides]
	#Allows you to override the displayed values for dimensions
	enabled = false
	#The Dimensions to override
	dimensions = []

